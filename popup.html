<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h3>Text Settings</h3>

<div class="setting-group">
    <button type="button" class="toggle-slider" data-target="fontSize">Font Size</button>
    <div class="slider-container" id="fontSize-container" style="display:none;">
        <input type="range" id="fontSize" min="12" max="40" value="16">
    </div>
</div>

<div class="setting-group">
    <button type="button" class="toggle-slider" data-target="lineHeight">Line Height</button>
    <div class="slider-container" id="lineHeight-container" style="display:none;">
        <input type="range" id="lineHeight" min="1" max="3" step="0.1" value="1.5">
    </div>
</div>

<div class="setting-group">
    <button type="button" class="toggle-slider" data-target="spacing">Letter Spacing</button>
    <div class="slider-container" id="spacing-container" style="display:none;">
        <input type="range" id="spacing" min="0" max="5" step="0.1" value="0">
    </div>
</div>

<div class="setting-group">
    <button type="button" class="toggle-slider" data-target="fontFamily">Font</button>
    <div class="dropdown-container" id="fontFamily-container" style="display:none;">
        <select id="fontFamily">
            <option value="">Default (No Change)</option>
            <option value="Arial">Arial</option>
            <option value="Verdana">Verdana</option>
            <option value="Georgia">Georgia</option>
            <option value="Times New Roman">Times</option>
            <option value="OpenDyslexic">OpenDyslexic</option>
        </select>
    </div>
</div>

<div class="setting-group">
    <button type="button" class="toggle-slider" data-target="cursorSize">Cursor Size</button>
    <div class="dropdown-container" id="cursorSize-container" style="display:none;">
        <select id="cursorSize">
            <option value="default">Default</option>
            <option value="large">Large</option>
            <option value="xlarge">Extra Large</option>
        </select>
    </div>
</div>

<div class="setting-group">
    <button type="button" class="toggle-slider" data-target="highlight">Highlight Text</button>
    <div class="dropdown-container" id="highlight-container" style="display:none;">
        <label for="highlightColor">Highlight Color</label>
        <input id="highlightColor" type="color" value="#fff176" style="width:100%; margin-bottom: 8px;">
        <button id="highlight" style="width: 100%; margin-top: 6px; background:#ffea00;color:#000;border:1.5px solid #ccc;">Highlight Selection</button>
        <button id="clearHighlights" style="width: 100%; margin-top: 6px; background:#fff;color:#000;border:1.5px solid #888;">Clear Highlights</button>
    </div>
</div>

<button id="apply" style="margin-top:8px;">Apply</button>
<button id="reset" style="margin-top:8px;background:#fff;color:#5a7cff;border:1.5px solid #5a7cff;">Reset</button>

<script src="popup.js"></script>

</body>
</html>
